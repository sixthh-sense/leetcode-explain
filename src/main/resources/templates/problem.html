<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${problem.title}">Problem</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #1a1a2e; color: #e0e0e0; }
        h1 { color: #fff; margin-bottom: 16px; font-size: 1.5em; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 12px;
            height: calc(100vh - 100px);
        }
        .panel {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
        }
        .panel-header {
            font-size: 0.85em;
            font-weight: bold;
            color: #53a8b6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #0f3460;
        }

        .description { white-space: pre-wrap; font-size: 0.95em; }
        .test-cases { white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; font-size: 0.9em; }
        .code-area {
            width: 100%;
            height: calc(100% - 40px);
            background: #0a0a23;
            color: #43d9ad;
            border: 1px solid #0f3460;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            resize: none;
            outline: none;
        }
        .solution-content {
            display: none;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            background: #0a0a23;
            color: #ffd700;
            padding: 12px;
            border-radius: 4px;
            margin-top: 10px;
        }
        .complexity-content {
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85em;
            background: #0a0a23;
            color: #c0c0c0;
            padding: 12px;
            border-radius: 4px;
        }
        .btn {
            padding: 8px 16px;
            font-size: 0.9em;
            color: #fff;
            background-color: #e94560;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:hover { background-color: #c73e54; }
        .nav-back {
            display: inline-block;
            margin-top: 12px;
            text-decoration: none;
            color: #53a8b6;
            font-size: 0.9em;
        }
        .nav-back:hover { text-decoration: underline; }
        .empty-panel {
            color: #555;
            font-style: italic;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div th:if="${problem != null}">
        <h1 th:text="${problem.title}">Problem Title</h1>

        <div class="grid">
            <!-- 1. 문제 내용 (좌상) -->
            <div class="panel">
                <div class="panel-header">Description</div>
                <div class="description" th:text="${problem.description}">Problem description here...</div>
            </div>

            <!-- 2. 테스트 케이스 (우상) -->
            <div class="panel">
                <div class="panel-header">Test Cases</div>
                <div class="test-cases">
                    <div th:each="tc : ${problem.testCases}" style="margin-bottom: 15px; border-bottom: 1px solid #0f3460; padding-bottom: 10px;">
                        <strong th:text="'Example ' + ${tc.sequence} + ':'" style="color: #53a8b6;">Example 1:</strong>
                        <div style="margin-top: 5px;">
                            <span style="color: #ffd700;">Input:</span> <span th:text="${tc.input}"></span>
                        </div>
                        <div>
                            <span style="color: #ffd700;">Output:</span> <span th:text="${tc.output}"></span>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(problem.testCases)}" class="empty-panel">
                        등록된 테스트 케이스가 없습니다.
                    </div>
                </div>
            </div>

            <!-- 3. 코드 스니펫 (좌중) -->
            <div class="panel">
                <div class="panel-header">Code</div>
                <textarea class="code-area" th:text="${problem.codeSnippet}" spellcheck="false">Write your code here...</textarea>
            </div>

            <!-- 4. 기존 답안 (우중) -->
            <div class="panel">
                <div class="panel-header">Solution</div>
                <button class="btn" onclick="toggleSolution()">답안 보기</button>
                <div id="solutionArea" class="solution-content" th:text="${problem.solution}">Stored solution code...</div>
            </div>

            <!-- 5. Memory / Runtime (좌하) -->
            <div class="panel">
                <div class="panel-header">Memory / Runtime</div>
                <div th:if="${problem.memoryRuntime != null}" class="complexity-content" th:text="${problem.memoryRuntime}"></div>
                <div th:if="${problem.memoryRuntime == null}" class="empty-panel">Submit 후 결과가 기록됩니다.</div>
            </div>

            <!-- 6. 시간복잡도 / 공간복잡도 (우하) -->
            <div class="panel">
                <div class="panel-header">Time / Space Complexity (Big-O)</div>
                <div th:if="${problem.complexity != null}" class="complexity-content" th:text="${problem.complexity}"></div>
                <div th:if="${problem.complexity == null}" class="empty-panel">복잡도 분석이 아직 작성되지 않았습니다.</div>
            </div>
        </div>

        <a href="/" class="nav-back">← 목록으로 돌아가기</a>
    </div>

    <div th:if="${problem == null}" style="text-align:center; margin-top:100px;">
        <h1>문제를 찾을 수 없습니다.</h1>
        <a href="/" class="nav-back">← 목록으로 돌아가기</a>
    </div>

    <script>
        function toggleSolution() {
            var sol = document.getElementById("solutionArea");
            var btn = document.querySelector(".btn");
            if (sol.style.display === "none" || sol.style.display === "") {
                sol.style.display = "block";
                btn.textContent = "답안 가리기";
            } else {
                sol.style.display = "none";
                btn.textContent = "답안 보기";
            }
        }
    </script>
</body>
</html>
